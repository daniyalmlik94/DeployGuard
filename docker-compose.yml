services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: deployguard
      POSTGRES_USER: deployguard
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-deployguard}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U deployguard"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/deployguard
      SPRING_DATASOURCE_USERNAME: deployguard
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-deployguard}
      DEPLOYGUARD_ENCRYPTION_KEY: ${DEPLOYGUARD_ENCRYPTION_KEY}
      DEPLOYGUARD_JWT_SECRET: ${DEPLOYGUARD_JWT_SECRET}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
